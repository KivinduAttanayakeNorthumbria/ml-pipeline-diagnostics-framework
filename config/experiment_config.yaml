# Experiment Configurations

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_perturbed: "data/perturbed"
  results_figures: "results/figures"
  results_reports: "results/reports"
  results_tables: "results/tables"
  results_per_sample: "results/per_sample"
  thresholds_file: "results/reports/thresholds.json"
  feedback_file: "results/reports/gradcam_feedback.json"

random_seeds:
  primary_seed: 42
  seed_variation_list: [0, 1, 2, 3, 4]
  image_seed_list: [0, 1, 2]

device: "cuda"

# Switch datasets here. One line each.
active_tabular: "adult"
active_image: "fashion_mnist"

datasets:
  tabular:
    diabetes:
      name: "Diabetes Health Indicators"
      short_name: "diabetes"
      type: "tabular"
      task: "binary_classification"
      file_name: "diabetes_binary_health_indicators_BRFSS2015.csv"
      target_column: "Diabetes_binary"
      test_size: 0.2
      missing_value: "median"
      remove_duplicates: false
      na_values: []

    adult:
      name: "UCI Adult Income"
      short_name: "adult"
      type: "tabular"
      task: "binary_classification"
      file_name: "adult_income.csv"
      target_column: "income"
      test_size: 0.2
      missing_value: "mode"
      remove_duplicates: false
      na_values: ["?", " ?"]

  image:
    cifar10:
      name: "CIFAR-10"
      short_name: "cifar10"
      type: "image"
      task: "multiclass_classification"
      folder_name: "cifar10"
      num_classes: 10
      image_size: 32
      num_channels: 3
      test_size: 0.2

    fashion_mnist:
      name: "Fashion-MNIST"
      short_name: "fashion_mnist"
      type: "image"
      task: "multiclass_classification"
      folder_name: "fashion_mnist"
      num_classes: 10
      image_size: 28
      num_channels: 1
      test_size: 0.2

models:
  random_forest:
    type: "tabular"
    params:
      n_estimators: 100
      max_depth: 15
      random_state: 42
      n_jobs: -1

  xgboost:
    type: "tabular"
    params:
      n_estimators: 100
      max_depth: 6
      learning_rate: 0.1
      random_state: 42

  fcnn:
    type: "tabular"
    params:
      dropout_rate: 0.3
      learning_rate: 0.001
      batch_size: 256
      epochs: 50
      early_stopping_patience: 5

  simple_cnn:
    type: "image"
    params:
      dropout_rate: 0.3
      learning_rate: 0.001
      batch_size: 64
      epochs: 20
      early_stopping_patience: 5

  resnet18:
    type: "image"
    params:
      pretrained: true
      dropout_rate: 0.3
      learning_rate: 0.0001
      batch_size: 64
      epochs: 20
      early_stopping_patience: 5

stage1_data_quality:
  perturbations:
    missing_values:
      fractions: [0.05, 0.10, 0.20]
      strategy: "random"

    class_imbalance:
      ratios: [0.5, 0.3, 0.1]
      method: "undersample"

    noise_injection:
      noise_levels: [0.1, 0.2, 0.5]
      target_features: "numeric"

    image_corruption:
      blur_sigma: [1.0, 4.0]
      brightness_delta: [0.2, 0.6]

stage2_training_stability:
  seed_variation:
    num_seeds: 5

  data_size_variation:
    fractions: [0.75, 0.50, 0.25]

  hyperparameter_variation:
    learning_rates: [0.01, 0.0001]
    batch_sizes: [32, 128]
    learning_rates_images: [0.01, 0.0001]
    batch_sizes_images: [32, 256]

stage3_inference:
  uncertainty:
    mc_dropout:
      num_forward_passes: 50
      dropout_rate: 0.3

    deep_ensembles:
      num_models: 5
      ensemble_seeds: [0, 1, 2, 3, 4]

  explainability:
    shap:
      num_background_samples: 100
      max_samples_to_explain: 200

    lime:
      num_features: 10
      num_samples: 500
      max_samples_to_explain: 200

    gradcam:
      target_layer: "auto"
      max_samples_to_explain: 100

  flagging:
    explanation_consistency_threshold: 0.5

# Blind spot detection (population level collapse detector)
collapse_detection:
  enabled: true
  entropy_drop_ratio: 0.5

performance:
  track_training_time: true
  track_inference_time: true
  track_memory_usage: true
  track_diagnostic_overhead: true